name: Generate PDF and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Combine Files
        run: |
          OUTPUT="full_documentation.md"
          echo "# Templates" > "$OUTPUT"
          
          # 获取所有前缀并过滤掉输出文件本身
          PREFIXES=$(ls | grep -E "\.(cpp|hpp|md)$" | grep -v "^$OUTPUT" | sed 's/\.[^.]*$//' | sort -u)
          
          for p in $PREFIXES; do
            echo "Processing prefix: $p"
            
            # 1. Markdown
            if [ -f "$p.md" ] && [ "$p.md" != "$OUTPUT" ]; then
              cat "$p.md" >> "$OUTPUT"
              echo -e "\n" >> "$OUTPUT"
            fi
            
            # 2. CPP
            if [ -f "$p.cpp" ]; then
              echo "### $p.cpp" >> "$OUTPUT"
              echo '```cpp' >> "$OUTPUT"
              cat "$p.cpp" >> "$OUTPUT"
              echo -e '\n```\n' >> "$OUTPUT"
            fi
            
            # 3. HPP
            if [ -f "$p.hpp" ]; then
              echo "### $p.hpp" >> "$OUTPUT"
              echo '```cpp' >> "$OUTPUT"
              cat "$p.hpp" >> "$OUTPUT"
              echo -e '\n```\n' >> "$OUTPUT"
            fi
          done

      - name: Install Pandoc and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex fonts-noto-cjk

      - name: Run Pandoc Local
        run: |
          pandoc full_documentation.md \
            -o template.pdf \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Sans CJK SC" \
            -V geometry:margin=1.5cm \
            -V fontsize=10pt \
            --highlight-style pygments

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: template.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}