name: Generate PDF and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Combine Files
        run: |
          OUTPUT="full_documentation.md"
          echo "# Project Documentation Summary" > "$OUTPUT"
          
          # 获取所有前缀并过滤掉输出文件本身
          PREFIXES=$(ls | grep -E "\.(cpp|hpp|md)$" | grep -v "^$OUTPUT" | sed 's/\.[^.]*$//' | sort -u)
          
          for p in $PREFIXES; do
            echo "Processing prefix: $p"
            echo -e "\n---\n# Module: $p\n" >> "$OUTPUT"
            
            # 1. Markdown
            if [ -f "$p.md" ] && [ "$p.md" != "$OUTPUT" ]; then
              cat "$p.md" >> "$OUTPUT"
              echo -e "\n" >> "$OUTPUT"
            fi
            
            # 2. CPP
            if [ -f "$p.cpp" ]; then
              echo "#### $p.cpp" >> "$OUTPUT"
              echo '```cpp' >> "$OUTPUT"
              cat "$p.cpp" >> "$OUTPUT"
              echo -e '\n```\n' >> "$OUTPUT"
            fi
            
            # 3. HPP
            if [ -f "$p.hpp" ]; then
              echo "#### $p.hpp" >> "$OUTPUT"
              echo '```cpp' >> "$OUTPUT"
              cat "$p.hpp" >> "$OUTPUT"
              echo -e '\n```\n' >> "$OUTPUT"
            fi
          done

      # 步骤 2: 使用官方 Pandoc 镜像进行转换
      # 这种格式直接调用 Docker Hub 镜像，不依赖 GitHub Action 仓库
      - name: Convert MD to PDF
        uses: docker://pandoc/latex:latest
        with:
          args: >-
            full_documentation.md
            -o project_docs.pdf
            --pdf-engine=xelatex
            -V CJKmainfont="DejaVu Sans"

      # 步骤 3: 发布 Release
      # 这个 Action 由 GitHub 官方维护，极度稳定
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: project_docs.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}